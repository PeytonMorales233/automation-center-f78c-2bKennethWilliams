# Alemic configuration file for automation-center-f78c-2bKennethWilliams
# PROMPT-F78CD1-000083 — Async-first placeholder; update for asyncpg/sqlalchemy 2.0+ when ready

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# max length of characters to apply to the "slug" field
# revision slug length
# rev_id_length = 8

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# version location specification; this defaults
# to alembic/versions.  When using multiple version
# directories, separate each with a space or newline
# version_locations = %(here)s/foo %(here)s/bar
version_locations = alembic/versions

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

sqlalchemy.url = driver://user:pass@localhost/dbname

# Custom placeholder: replace with async URL (e.g., postgresql+asyncpg://...) in production
# ⚠️ WARNING: Alembic does NOT natively support async drivers yet.
# For SQLAlchemy 2.0+ async migrations, consider:
#   - Using 'sqlalchemy.sync_url' + manual async session handling in env.py, OR
#   - Deferring async migrations until native support lands (tracked in https://github.com/sqlalchemy/alembic/issues/954)
#   - Using 'alembic --sql' mode for schema diffing + custom async apply logic.

# Logging configuration
[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts after they have been written
# to disk.  See the documentation for further detail and examples.

# hooks = my_hook

# my_hook.type = console_scripts
# my_hook.entrypoint = my_package.hook

[pre_process_revision_environment]
# pre_process_revision_environment = true

[post_process_revision_environment]
# post_process_revision_environment = true

[logging]
# Logging configuration is pasted below.
# Note: This is *not* the logging configuration for the application itself,
# but only for Alembic's internal logging.

[logging]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
